name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Godot Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          
          relative_project_path: ./
          
          relative_export_path: build/web
  
      - name: Install and Push with Butler
        uses: abrignoni/action-butler@master
        with:
          executable-path: .
          itch-user: ${{ secrets.ITCH_USER }}
          itch-game: ${{ secrets.ITCH_GAME }}
          package: build/web
          channel: web
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
